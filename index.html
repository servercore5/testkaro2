<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KKI System</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: #00ff9d;
    text-align: center;
}

h1, h2 {
    text-shadow: 0 0 10px #00ff9d;
}

.container {
    padding: 20px;
}

button, input {
    padding: 10px;
    margin: 8px;
    border: 1px solid #00ff9d;
    background: black;
    color: #00ff9d;
    border-radius: 6px;
}

button:hover {
    background: #00ff9d;
    color: black;
    cursor: pointer;
}

.hidden { display: none; }

/* Terminal */
#terminal {
    text-align: left;
    max-width: 600px;
    margin: auto;
    height: 120px;
    overflow: hidden;
}

/* Loader */
.loader {
    border: 3px solid #003;
    border-top: 3px solid #00ff9d;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    margin: 10px auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Map */
#map {
    width: 90%;
    height: 250px;
    margin: 20px auto;
    border: 1px solid #00ff9d;
    position: relative;
    overflow: hidden;
    background: radial-gradient(circle, #001a12, black);
}

#map::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: conic-gradient(transparent, #00ff9d33);
    animation: radar 4s linear infinite;
}

@keyframes radar {
    100% { transform: rotate(360deg); }
}

.dot {
    width: 6px;
    height: 6px;
    background: #00ff9d;
    position: absolute;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    100% { transform: scale(2); opacity: 0; }
}

/* Locations */
.locations {
    max-height: 250px;
    overflow-y: auto;
    text-align: left;
}

.location {
    padding: 6px;
    border-left: 2px solid #00ff9d;
    margin: 3px;
}

/* Stats */
#stats {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1>KKI SYSTEM</h1>

<!-- STEP 1 -->
<div id="step1">
    <button onclick="showCase()">ENTER CASE ID</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
    <input type="number" id="caseId" placeholder="Enter Case ID">
    <button onclick="checkCase()">SUBMIT</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden">
    <input type="text" id="ipInput" placeholder="Enter IP Address">
    <button onclick="startTrace()">TRACE IP</button>

    <div id="terminal"></div>
    <div id="loader" class="loader hidden"></div>

    <div id="map"></div>
    <div id="stats"></div>

    <label>
        <input type="checkbox" id="soundToggle"> Sound
    </label>

    <div class="locations" id="result"></div>

    <button onclick="closePage()">CLOSE</button>
</div>

</div>

<script>

// STEP FLOW
function showCase() {
    step1.classList.add("hidden");
    step2.classList.remove("hidden");
}

function checkCase() {
    let id = caseId.value.trim();
    if(id === "556221") {
        step2.classList.add("hidden");
        step3.classList.remove("hidden");
    } else {
        alert("ACCESS DENIED");
    }
}

// ENTER KEY
caseId.addEventListener("keypress", e => {
    if(e.key === "Enter") checkCase();
});

// TERMINAL TYPE
function typeLine(text, speed=25) {
    return new Promise(res=>{
        let t = document.getElementById("terminal");
        let line = document.createElement("div");
        t.appendChild(line);
        let i=0;
        let int = setInterval(()=>{
            line.textContent += text[i++];
            if(i>=text.length){
                clearInterval(int);
                res();
            }
        }, speed);
    });
}

// START TRACE
async function startTrace() {
    let ip = ipInput.value.trim();
    if(ip==="") return alert("Enter IP");

    terminal.innerHTML="";
    result.innerHTML="";
    map.innerHTML="";
    loader.classList.remove("hidden");

    await typeLine("> Initializing...");
    await typeLine("> Connecting nodes...");
    await typeLine("> Scanning IP: "+ip);

    setTimeout(()=>{
        loader.classList.add("hidden");
        generate(ip);
    },1500);
}

// MASK IP
function maskIP(ip){
    let p=ip.split(".");
    if(p.length!==4) return "Invalid IP";
    return p[0]+"."+p[1]+".xxx.xxx";
}

// GENERATE DATA
function generate(ip){
    let countries=[
        "USA","India","UK","Canada","Germany","France","Brazil","Japan","Australia","Russia",
        "Italy","Spain","Netherlands","Sweden","Norway","Mexico","South Africa","China","UAE","Singapore",
        "Thailand","Turkey","Argentina","Poland","Indonesia"
    ];

    let masked=maskIP(ip);

    for(let i=0;i<148;i++){
        let c=countries[Math.floor(Math.random()*countries.length)];
        let loc="Node-"+Math.floor(Math.random()*999);

        let div=document.createElement("div");
        div.className="location";
        div.innerHTML=`${c} - ${loc} | IP: ${masked}`;
        result.appendChild(div);

        let dot=document.createElement("div");
        dot.className="dot";
        dot.style.top=Math.random()*100+"%";
        dot.style.left=Math.random()*100+"%";
        map.appendChild(dot);
    }

    stats.innerHTML=`
    Active Nodes: 148<br>
    Countries: 25<br>
    Status: Simulation Running
    `;

    playSound();
}

// SOUND
function playSound(){
    if(!soundToggle.checked) return;
    new Audio("https://www.soundjay.com/button/beep-07.wav").play();
}

// CLOSE
function closePage(){
    window.location.href="https://www.google.com";
}

</script>

</body>
</html>
